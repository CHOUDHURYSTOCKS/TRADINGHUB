<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quant Hedge Fund AI Terminal</title>
<link rel="icon" href="logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:#040817;
    color:#cbd5e1;
    font-family:Arial;
}

header{
    text-align:center;
    padding:10px;
    background:#0f172a;
    color:#38bdf8;
    font-weight:bold;
}

/* layout */
.grid{
    display:grid;
    grid-template-columns:1fr 2fr 1.5fr;
    gap:10px;
    padding:10px;
}

.panel{
    background:#0b1220;
    border-radius:10px;
    padding:10px;
}

/* text */
h3{
    margin:5px 0;
    color:#38bdf8;
    font-size:12px;
}

.big{
    font-size:20px;
    color:#facc15;
}

/* table */
table{
    width:100%;
    border-collapse:collapse;
    font-size:11px;
}

th,td{
    padding:5px;
    text-align:center;
    border-bottom:1px solid #1f2937;
}

th{color:#38bdf8}

.call{color:#22c55e}
.put{color:#ef4444}

/* heat */
.high{background:#7f1d1d}
.mid{background:#78350f}
.low{background:#052e16}

/* buttons */
button,select{
    padding:6px;
    border-radius:6px;
    border:none;
    font-weight:bold;
}
button{background:#22c55e;color:white;cursor:pointer}

canvas{
    width:100%;
    height:170px;
    background:#0b1220;
    border-radius:10px;
}
</style>
</head>

<body>

<header>🏦 QUANT HEDGE FUND AI OPTIONS SYSTEM (SIMULATED PRO PROP DESK)</header>

<div class="grid">

<!-- LEFT -->
<div class="panel">
<h3>MARKET CONTROL</h3>

<select id="symbol">
<option>NIFTY</option>
<option>SENSEX</option>
</select>

<button onclick="start()">START ENGINE</button>
<button onclick="stop()">STOP</button>

<hr>

Spot
<div class="big" id="spot">0</div>

PCR <div id="pcr">0</div>
IV <div id="iv">0</div>
GEX <div id="gex">0</div>

<hr>
Regime:
<div class="big" id="regime">WAIT</div>

Signal:
<div class="big" id="signal">NONE</div>

Confidence:
<div class="big" id="conf">0%</div>

</div>

<!-- CENTER -->
<div class="panel">
<h3>PRICE ACTION ENGINE</h3>
<canvas id="chart" width="500" height="170"></canvas>

<h3>AI STRATEGY SCORE</h3>
<div class="big" id="score">0</div>

<h3>PROBABILITY MODEL</h3>
Up Move: <span id="up">0</span>%<br>
Down Move: <span id="down">0</span>%
</div>

<!-- RIGHT -->
<div class="panel">
<h3>OPTION CHAIN LIQUIDITY MAP</h3>

<table>
<thead>
<tr>
<th>CE OI</th>
<th>STRIKE</th>
<th>PE OI</th>
<th>ZONE</th>
</tr>
</thead>
<tbody id="chain"></tbody>
</table>

</div>

</div>

<script>

let spot=22500;
let t;
let hist=[];

function r(a,b){return Math.random()*(b-a)+a;}
function ri(a,b){return Math.floor(r(a,b));}

// chain
function chain(){
    let arr=[];
    for(let i=-9;i<=9;i++){
        let strike=spot+i*50;

        let ceOI=ri(3000,26000);
        let peOI=ri(3000,26000);

        arr.push({strike,ceOI,peOI});
    }
    return arr;
}

// PCR
function pcr(d){
    let pe=d.reduce((a,b)=>a+b.peOI,0);
    let ce=d.reduce((a,b)=>a+b.ceOI,0);
    return pe/ce;
}

// IV proxy (volatility model)
function iv(d){
    return (Math.random()*20+10).toFixed(2);
}

// GEX
function gex(d){
    let max=d.reduce((a,b)=>b.ceOI>a.ceOI?b:a);
    let min=d.reduce((a,b)=>b.peOI>a.peOI?b:a);
    return (max.strike+min.strike)/2;
}

// regime
function regime(score,pcr,iv){
    if(score>70 && iv>18) return "VOL BREAKOUT";
    if(score>70) return "TRENDING";
    if(score<40) return "MEAN REVERSION";
    return "RANGE";
}

// AI SCORE (quant model)
function score(d){
    let ce=d.reduce((a,b)=>a+b.ceOI,0);
    let pe=d.reduce((a,b)=>a+b.peOI,0);

    let imbalance=Math.abs(pe-ce)/(pe+ce);
    return Math.min(100,(imbalance*80 + r(0,25))).toFixed(0);
}

// probability model
function prob(sc){
    let up=Math.max(10,Math.min(90,sc));
    return {
        up:up,
        down:100-up
    };
}

// signal engine
function signal(sc,pcr){
    if(sc>70 && pcr>1.2) return "LONG BREAKOUT 📈";
    if(sc>70 && pcr<0.8) return "SHORT BREAKDOWN 📉";
    if(sc<40) return "SCALP RANGE ⚖️";
    return "NO TRADE";
}

// zone
function zone(ce,pe){
    let d=Math.abs(ce-pe);
    if(d>18000) return "HIGH";
    if(d>9000) return "MID";
    return "LOW";
}

// render
function render(){

    let d=chain();

    let sc=score(d);
    let p=pcr(d);
    let g=gex(d);
    let v=iv(d);

    let pr=prob(sc);

    document.getElementById("spot").innerText=spot;
    document.getElementById("pcr").innerText=p.toFixed(2);
    document.getElementById("iv").innerText=v;
    document.getElementById("gex").innerText=g.toFixed(0);

    document.getElementById("score").innerText=sc;
    document.getElementById("signal").innerText=signal(sc,p);
    document.getElementById("regime").innerText=regime(sc,p,v);
    document.getElementById("conf").innerText=sc+"%";

    document.getElementById("up").innerText=pr.up;
    document.getElementById("down").innerText=pr.down;

    let t=document.getElementById("chain");
    t.innerHTML="";

    d.forEach(x=>{

        let z=zone(x.ceOI,x.peOI);

        let cls = z=="HIGH"?"high":z=="MID"?"mid":"low";

        t.innerHTML+=`
        <tr class="${cls}">
            <td class="call">${x.ceOI}</td>
            <td>${x.strike}</td>
            <td class="put">${x.peOI}</td>
            <td>${z}</td>
        </tr>`;
    });

    spot+=ri(-90,90);

    hist.push(spot);
    if(hist.length>70) hist.shift();

    draw();
}

// chart
function draw(){
    let c=document.getElementById("chart");
    let ctx=c.getContext("2d");

    ctx.clearRect(0,0,c.width,c.height);

    let max=Math.max(...hist);
    let min=Math.min(...hist);

    ctx.strokeStyle="#38bdf8";
    ctx.beginPath();

    hist.forEach((p,i)=>{
        let x=i*(c.width/hist.length);
        let y=c.height-((p-min)/(max-min||1))*c.height;
        i==0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });

    ctx.stroke();
}

function start(){
    if(t) return;
    t=setInterval(render,900);
    render();
}

function stop(){
    clearInterval(t);
    t=null;
}

</script>

</body>
</html>
