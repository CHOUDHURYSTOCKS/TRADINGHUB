<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bloomberg Style Options Terminal</title>
<link rel="icon" href="logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:#050814;
    color:#d1d5db;
    font-family:Arial;
}

/* TOP BAR */
header{
    background:#0f172a;
    padding:10px;
    text-align:center;
    color:#38bdf8;
    font-weight:bold;
}

/* GRID LAYOUT */
.container{
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap:10px;
    padding:10px;
}

/* PANELS */
.panel{
    background:#0f172a;
    border-radius:10px;
    padding:10px;
}

h3{
    margin:5px 0;
    color:#38bdf8;
    font-size:13px;
}

/* CONTROLS */
button,select{
    padding:6px;
    border-radius:6px;
    border:none;
    font-weight:bold;
}

button{background:#22c55e;color:white}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    font-size:11px;
}

th,td{
    padding:5px;
    text-align:center;
    border-bottom:1px solid #1f2937;
}

th{color:#38bdf8}

/* COLORS */
.call{color:#22c55e}
.put{color:#ef4444}

.low{background:#052e16}
.mid{background:#78350f}
.high{background:#7f1d1d}

canvas{
    width:100%;
    height:160px;
    background:#0b1220;
    border-radius:10px;
}

.big{
    font-size:18px;
    color:#facc15;
}

.center{
    text-align:center;
}

.gauge{
    width:100%;
    height:10px;
    background:#1f2937;
    border-radius:10px;
    overflow:hidden;
}

.fill{
    height:10px;
    background:#22c55e;
    width:0%;
}

</style>
</head>

<body>

<header>🏛️ BLOOMBERG STYLE OPTIONS TERMINAL (SIMULATED INSTITUTIONAL DESK)</header>

<div class="container">

<!-- LEFT PANEL -->
<div class="panel">

<h3>MARKET CONTROL</h3>

<select id="symbol">
<option>NIFTY</option>
<option>SENSEX</option>
</select>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<hr>

<div class="center">
Spot Price<br>
<div class="big" id="spot">0</div>
</div>

<hr>

PCR
<div class="gauge"><div class="fill" id="pcrBar"></div></div>

<br>

<div>GEX Zone: <b id="gex">0</b></div>
<div>Regime: <b id="regime">Neutral</b></div>

</div>

<!-- CENTER PANEL -->
<div class="panel">

<h3>LIVE PRICE CHART</h3>
<canvas id="chart" width="400" height="160"></canvas>

<h3>AI STRATEGY ENGINE</h3>
<div class="center big" id="signal">WAIT</div>
<div class="center">Confidence: <b id="conf">0</b>%</div>

</div>

<!-- RIGHT PANEL -->
<div class="panel">

<h3>OPTION CHAIN HEATMAP</h3>

<table>
<thead>
<tr>
<th>CE OI</th>
<th>STRIKE</th>
<th>PE OI</th>
<th>FLOW</th>
</tr>
</thead>
<tbody id="chain"></tbody>
</table>

</div>

</div>

<script>

let spot = 22500;
let timer;
let hist=[];

function r(a,b){return Math.random()*(b-a)+a;}
function ri(a,b){return Math.floor(r(a,b));}

// option chain
function chain(){
    let arr=[];
    for(let i=-8;i<=8;i++){
        let strike=spot+i*50;
        arr.push({
            strike,
            ceOI:ri(2000,25000),
            peOI:ri(2000,25000)
        });
    }
    return arr;
}

// PCR
function pcr(d){
    let pe=d.reduce((a,b)=>a+b.peOI,0);
    let ce=d.reduce((a,b)=>a+b.ceOI,0);
    return pe/ce;
}

// GEX zone
function gex(d){
    let max=d.reduce((a,b)=>b.ceOI>a.ceOI?b:a);
    let min=d.reduce((a,b)=>b.peOI>a.peOI?b:a);
    return (max.strike+min.strike)/2;
}

// regime detection
function regime(score,pcr){
    if(score>70 && pcr>1.2) return "TREND BULL";
    if(score>70 && pcr<0.8) return "TREND BEAR";
    if(score<40) return "RANGE";
    return "TRANSITION";
}

// AI score
function ai(d){
    let ce=d.reduce((a,b)=>a+b.ceOI,0);
    let pe=d.reduce((a,b)=>a+b.peOI,0);
    return Math.min(100,Math.abs(pe-ce)/(pe+ce)*100 + r(0,20)).toFixed(0);
}

// signal
function signal(score,pcr){
    if(score>70 && pcr>1.1) return "LONG BREAKOUT 📈";
    if(score>70 && pcr<0.9) return "SHORT BREAKDOWN 📉";
    if(score<40) return "SCALP RANGE ⚖️";
    return "NO TRADE ⏳";
}

// render
function render(){

    let d=chain();

    let p=pcr(d);
    let score=ai(d);
    let g=gex(d);

    document.getElementById("spot").innerText=spot;
    document.getElementById("gex").innerText=g.toFixed(0);
    document.getElementById("signal").innerText=signal(score,p);
    document.getElementById("conf").innerText=score;

    document.getElementById("regime").innerText=regime(score,p);

    // PCR BAR
    let pct=Math.min(100,p*50);
    document.getElementById("pcrBar").style.width=pct+"%";

    // TABLE
    let t=document.getElementById("chain");
    t.innerHTML="";

    d.forEach(x=>{

        let flow = Math.abs(x.ceOI-x.peOI);

        let cls = flow>15000?"high":
                  flow>8000?"mid":"low";

        t.innerHTML+=`
        <tr class="${cls}">
            <td class="call">${x.ceOI}</td>
            <td>${x.strike}</td>
            <td class="put">${x.peOI}</td>
            <td>${cls.toUpperCase()}</td>
        </tr>`;
    });

    // PRICE MOVE
    spot += ri(-80,80);
    hist.push(spot);
    if(hist.length>80) hist.shift();

    draw();
}

// chart
function draw(){
    let c=document.getElementById("chart");
    let ctx=c.getContext("2d");

    ctx.clearRect(0,0,c.width,c.height);

    let max=Math.max(...hist);
    let min=Math.min(...hist);

    ctx.strokeStyle="#38bdf8";
    ctx.beginPath();

    hist.forEach((p,i)=>{
        let x=i*(c.width/hist.length);
        let y=c.height-((p-min)/(max-min||1))*c.height;
        i==0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });

    ctx.stroke();
}

function start(){
    if(timer) return;
    timer=setInterval(render,900);
    render();
}

function stop(){
    clearInterval(timer);
    timer=null;
}

</script>

</body>
</html>
