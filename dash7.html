<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Option Chain Analyzer - NIFTY & SENSEX</title>
<link rel="icon" href="logo.png">
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
    }

    header {
        padding: 15px;
        text-align: center;
        background: #111827;
        font-size: 20px;
        font-weight: bold;
        color: #38bdf8;
    }

    .controls {
        display: flex;
        justify-content: center;
        gap: 10px;
        padding: 15px;
        flex-wrap: wrap;
    }

    select, button {
        padding: 10px;
        border-radius: 6px;
        border: none;
        outline: none;
        font-weight: bold;
    }

    button {
        background: #22c55e;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #16a34a;
    }

    .stats {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 10px;
        flex-wrap: wrap;
    }

    .card {
        background: #1f2937;
        padding: 10px 15px;
        border-radius: 10px;
        min-width: 150px;
        text-align: center;
    }

    .card span {
        display: block;
        font-size: 14px;
        color: #94a3b8;
    }

    .card b {
        font-size: 18px;
        color: #facc15;
    }

    table {
        width: 95%;
        margin: 20px auto;
        border-collapse: collapse;
        background: #1e293b;
        border-radius: 10px;
        overflow: hidden;
    }

    th, td {
        padding: 8px;
        text-align: center;
        border-bottom: 1px solid #334155;
        font-size: 13px;
    }

    th {
        background: #0b1220;
        color: #38bdf8;
        position: sticky;
        top: 0;
    }

    .ce {
        color: #22c55e;
    }

    .pe {
        color: #ef4444;
    }

    .highlight {
        background: rgba(56,189,248,0.1);
    }
</style>
</head>

<body>

<header>
    Live Option Chain Analysis - NIFTY50 & SENSEX (Day Trading Tool)
</header>

<div class="controls">
    <select id="symbol">
        <option value="NIFTY">NIFTY50</option>
        <option value="SENSEX">SENSEX</option>
    </select>

    <button onclick="startFeed()">Start Live Feed</button>
    <button onclick="stopFeed()">Stop</button>
</div>

<div class="stats">
    <div class="card">
        <span>Spot Price</span>
        <b id="spot">0</b>
    </div>

    <div class="card">
        <span>Max Pain</span>
        <b id="maxPain">0</b>
    </div>

    <div class="card">
        <span>Trend Bias</span>
        <b id="bias">Neutral</b>
    </div>
</div>

<table>
    <thead>
        <tr>
            <th>CALL OI</th>
            <th>CALL LTP</th>
            <th>STRIKE</th>
            <th>PUT LTP</th>
            <th>PUT OI</th>
        </tr>
    </thead>
    <tbody id="chain"></tbody>
</table>

<script>
let interval;
let spotPrice = 22500;

function random(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

// Generate mock option chain
function generateChain() {
    const strikes = [];
    const base = spotPrice;

    for (let i = -10; i <= 10; i++) {
        strikes.push(base + i * 50);
    }

    return strikes.map(strike => {
        let ceOI = random(1000, 20000);
        let peOI = random(1000, 20000);

        let ceLTP = Math.max(1, random(50, 500) - Math.abs(strike - spotPrice)/10);
        let peLTP = Math.max(1, random(50, 500) - Math.abs(strike - spotPrice)/10);

        return {
            strike,
            ceOI,
            peOI,
            ceLTP: ceLTP.toFixed(2),
            peLTP: peLTP.toFixed(2)
        };
    });
}

// Max pain calculation (simplified)
function calculateMaxPain(data) {
    let minPain = Infinity;
    let bestStrike = 0;

    data.forEach(d => {
        let pain = Math.abs(d.ceOI - d.peOI);
        if (pain < minPain) {
            minPain = pain;
            bestStrike = d.strike;
        }
    });

    return bestStrike;
}

// Trend bias
function getBias(data) {
    let ce = data.reduce((a,b)=>a+b.ceOI,0);
    let pe = data.reduce((a,b)=>a+b.peOI,0);

    if (ce > pe * 1.1) return "Bearish 📉";
    if (pe > ce * 1.1) return "Bullish 📈";
    return "Neutral ⚖️";
}

function render() {
    const data = generateChain();

    document.getElementById("spot").innerText = spotPrice;

    document.getElementById("maxPain").innerText = calculateMaxPain(data);
    document.getElementById("bias").innerText = getBias(data);

    const tbody = document.getElementById("chain");
    tbody.innerHTML = "";

    data.forEach(d => {
        tbody.innerHTML += `
            <tr>
                <td class="ce">${d.ceOI}</td>
                <td class="ce">${d.ceLTP}</td>
                <td class="highlight">${d.strike}</td>
                <td class="pe">${d.peLTP}</td>
                <td class="pe">${d.peOI}</td>
            </tr>
        `;
    });

    // simulate spot movement
    spotPrice += random(-50, 50);
}

function startFeed() {
    if (interval) return;
    interval = setInterval(render, 2000);
    render();
}

function stopFeed() {
    clearInterval(interval);
    interval = null;
}
</script>

</body>
</html>
