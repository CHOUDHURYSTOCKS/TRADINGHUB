<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hedge Fund AI Options Terminal</title>
<link rel="icon" href="logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    background:#050814;
    color:#d1d5db;
    font-family:Arial;
}

header {
    text-align:center;
    padding:12px;
    background:#0f172a;
    color:#38bdf8;
    font-weight:bold;
}

.grid {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    padding:10px;
}

.card {
    background:#111827;
    padding:10px;
    border-radius:10px;
    min-width:150px;
    text-align:center;
}

.card b { color:#facc15; }

table {
    width:96%;
    margin:auto;
    border-collapse:collapse;
    background:#0f172a;
}

th,td {
    padding:6px;
    font-size:12px;
    text-align:center;
    border-bottom:1px solid #1f2937;
}

th { color:#38bdf8; }

.call { color:#22c55e; }
.put { color:#ef4444; }

.zone-high { background:#7f1d1d; }
.zone-mid { background:#78350f; }
.zone-low { background:#052e16; }

canvas {
    display:block;
    margin:10px auto;
    background:#0f172a;
    border-radius:10px;
}

button,select {
    padding:8px;
    border-radius:6px;
    border:none;
    font-weight:bold;
}

button { background:#22c55e; color:white; cursor:pointer; }

</style>
</head>

<body>

<header>🏦 HEDGE FUND AI OPTIONS TERMINAL (SIMULATED PROP DESK)</header>

<div class="grid">

<select id="symbol">
<option>NIFTY</option>
<option>SENSEX</option>
</select>

<button onclick="start()">START AI FEED</button>
<button onclick="stop()">STOP</button>

<div class="card">Spot<br><b id="spot">0</b></div>
<div class="card">AI Score<br><b id="score">0</b></div>
<div class="card">GEX Zone<br><b id="gex">0</b></div>
<div class="card">Strategy<br><b id="strategy">WAIT</b></div>
<div class="card">PCR<br><b id="pcr">0</b></div>

</div>

<canvas id="chart" width="900" height="170"></canvas>

<table>
<thead>
<tr>
<th>CE OI</th>
<th>CE LTP</th>
<th>STRIKE</th>
<th>PE LTP</th>
<th>PE OI</th>
<th>FLOW ZONE</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

<script>

let spot = 22500;
let timer;
let hist = [];

function r(a,b){ return Math.random()*(b-a)+a; }
function ri(a,b){ return Math.floor(r(a,b)); }

// chain generator
function chain(){
    let arr=[];
    for(let i=-10;i<=10;i++){
        let strike = spot + i*50;

        let ceOI = ri(3000,25000);
        let peOI = ri(3000,25000);

        arr.push({
            strike,
            ceOI,
            peOI,
            ceLTP:(r(40,400)/(Math.abs(i)+1)).toFixed(2),
            peLTP:(r(40,400)/(Math.abs(i)+1)).toFixed(2),
        });
    }
    return arr;
}

// PCR
function pcr(d){
    let pe=d.reduce((a,b)=>a+b.peOI,0);
    let ce=d.reduce((a,b)=>a+b.ceOI,0);
    return pe/ce;
}

// AI SCORE ENGINE (core hedge fund logic)
function aiScore(d){

    let ce = d.reduce((a,b)=>a+b.ceOI,0);
    let pe = d.reduce((a,b)=>a+b.peOI,0);

    let imbalance = Math.abs(pe-ce)/(pe+ce);
    let direction = pe>ce ? 1 : -1;

    let volatility = Math.random()*100;

    let score = (imbalance*60 + volatility*0.4 + Math.random()*20);

    return Math.min(100,score).toFixed(1);
}

// GEX proxy (gamma exposure zone)
function gex(d){
    let maxOI = d.reduce((a,b)=>b.ceOI>a.ceOI?b:a);
    let minOI = d.reduce((a,b)=>b.peOI>a.peOI?b:a);

    return ((maxOI.strike + minOI.strike)/2).toFixed(0);
}

// strategy engine
function strategy(score,pcr){

    if(score>70 && pcr>1.2) return "BREAKOUT LONG 📈";
    if(score>70 && pcr<0.8) return "BREAKOUT SHORT 📉";
    if(score<40) return "RANGE SCALP ⚖️";
    return "NO TRADE ⏳";
}

// flow zone
function zone(ce,pe){
    let diff = Math.abs(ce-pe);

    if(diff>15000) return "HIGH FLOW 🔴";
    if(diff>8000) return "MID FLOW 🟠";
    return "LOW FLOW 🟢";
}

// render
function render(){

    let d = chain();

    let p = pcr(d);
    let score = aiScore(d);
    let g = gex(d);

    document.getElementById("spot").innerText = spot;
    document.getElementById("score").innerText = score;
    document.getElementById("gex").innerText = g;
    document.getElementById("pcr").innerText = p.toFixed(2);
    document.getElementById("strategy").innerText = strategy(score,p);

    let t = document.getElementById("t");
    t.innerHTML="";

    d.forEach(x=>{

        let z = zone(x.ceOI,x.peOI);

        let cls = z.includes("HIGH") ? "zone-high" :
                  z.includes("MID") ? "zone-mid" : "zone-low";

        t.innerHTML+=`
        <tr class="${cls}">
            <td class="call">${x.ceOI}</td>
            <td class="call">${x.ceLTP}</td>
            <td>${x.strike}</td>
            <td class="put">${x.peLTP}</td>
            <td class="put">${x.peOI}</td>
            <td>${z}</td>
        </tr>`;
    });

    spot += ri(-100,100);

    hist.push(spot);
    if(hist.length>60) hist.shift();

    draw();
}

// chart
function draw(){
    let c=document.getElementById("chart");
    let ctx=c.getContext("2d");

    ctx.clearRect(0,0,c.width,c.height);

    let max=Math.max(...hist);
    let min=Math.min(...hist);

    ctx.strokeStyle="#38bdf8";
    ctx.beginPath();

    hist.forEach((p,i)=>{
        let x=i*(c.width/hist.length);
        let y=c.height-((p-min)/(max-min||1))*c.height;

        i==0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });

    ctx.stroke();
}

function start(){
    if(timer) return;
    timer=setInterval(render,1000);
    render();
}

function stop(){
    clearInterval(timer);
    timer=null;
}

</script>

</body>
</html>
