<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro Option Chain Dashboard - NIFTY & SENSEX</title>
<link rel="icon" href="logo.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        margin: 0;
    }

    header {
        background: #111827;
        padding: 15px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
    }

    .tabs {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin: 15px;
    }

    .tab {
        padding: 10px 20px;
        background: #1f2937;
        cursor: pointer;
        border-radius: 8px;
    }

    .tab.active {
        background: #2563eb;
    }

    .container {
        padding: 15px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 20px;
    }

    .card {
        background: #1f2937;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        background: #111827;
    }

    th, td {
        padding: 8px;
        text-align: center;
        border-bottom: 1px solid #374151;
    }

    th {
        background: #1f2937;
    }

    canvas {
        background: #111827;
        border-radius: 10px;
        padding: 10px;
        margin-top: 20px;
    }
</style>
</head>

<body>

<header>
    📊 Pro Option Chain Dashboard (NIFTY 50 / SENSEX)
</header>

<div class="tabs">
    <div class="tab active" onclick="switchIndex('NIFTY')">NIFTY 50</div>
    <div class="tab" onclick="switchIndex('SENSEX')">SENSEX</div>
</div>

<div class="container">

    <div class="grid">
        <div class="card">
            <h3>Spot Price</h3>
            <h2 id="spot">--</h2>
        </div>

        <div class="card">
            <h3>PCR</h3>
            <h2 id="pcr">--</h2>
        </div>

        <div class="card">
            <h3>Max Pain</h3>
            <h2 id="maxpain">--</h2>
        </div>

        <div class="card">
            <h3>Change</h3>
            <h2 id="change">--</h2>
        </div>
    </div>

    <canvas id="oiChart"></canvas>

    <table>
        <thead>
            <tr>
                <th>Strike</th>
                <th>CE OI</th>
                <th>PE OI</th>
                <th>CE Change</th>
                <th>PE Change</th>
            </tr>
        </thead>
        <tbody id="chainBody"></tbody>
    </table>

</div>

<script>
let currentIndex = "NIFTY";

function switchIndex(index) {
    currentIndex = index;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    event.target.classList.add("active");
    loadData();
}

/**
 * ⚠️ Replace this function with real API later
 * Suggested sources:
 * - NSE unofficial option chain endpoints
 * - Broker APIs (Zerodha, Angel One, Upstox)
 */
async function fetchOptionChain(index) {
    // MOCK DATA (replace with live API)
    const base = index === "NIFTY" ? 22000 : 72000;

    let strikes = [];
    for (let i = -10; i <= 10; i++) {
        strikes.push({
            strike: base + i * 50,
            ce_oi: Math.floor(Math.random() * 50000),
            pe_oi: Math.floor(Math.random() * 50000),
            ce_chg: Math.floor(Math.random() * 5000),
            pe_chg: Math.floor(Math.random() * 5000),
        });
    }

    return {
        spot: base + Math.floor(Math.random() * 100),
        pcr: (Math.random() * 2).toFixed(2),
        maxpain: base + 100,
        change: (Math.random() * 200).toFixed(2),
        chain: strikes
    };
}

let chart;

function renderChart(chain) {
    const labels = chain.map(x => x.strike);
    const ce = chain.map(x => x.ce_oi);
    const pe = chain.map(x => x.pe_oi);

    if (chart) chart.destroy();

    const ctx = document.getElementById("oiChart").getContext("2d");

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels,
            datasets: [
                {
                    label: "CE OI",
                    data: ce,
                    borderColor: "#3b82f6",
                    fill: false
                },
                {
                    label: "PE OI",
                    data: pe,
                    borderColor: "#22c55e",
                    fill: false
                }
            ]
        }
    });
}

function renderTable(chain) {
    const body = document.getElementById("chainBody");
    body.innerHTML = "";

    chain.forEach(row => {
        body.innerHTML += `
            <tr>
                <td>${row.strike}</td>
                <td>${row.ce_oi}</td>
                <td>${row.pe_oi}</td>
                <td>${row.ce_chg}</td>
                <td>${row.pe_chg}</td>
            </tr>
        `;
    });
}

async function loadData() {
    const data = await fetchOptionChain(currentIndex);

    document.getElementById("spot").innerText = data.spot;
    document.getElementById("pcr").innerText = data.pcr;
    document.getElementById("maxpain").innerText = data.maxpain;
    document.getElementById("change").innerText = data.change;

    renderChart(data.chain);
    renderTable(data.chain);
}

// Auto refresh every 10 seconds
loadData();
setInterval(loadData, 10000);

</script>

</body>
</html>
